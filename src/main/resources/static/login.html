<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Pokemon Battle Simulator</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #181c28;
      --border: #323a55;
      --text: #eef2ff;
      --muted: #96a0bb;
      --accent: #5ea2ff;
      --good: #59d98e;
      --warn: #f6c453;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, sans-serif;
      background: linear-gradient(180deg, #0b0f18, #121827 45%, #0f1117);
      color: var(--text);
      padding: 20px;
    }
    .card {
      width: min(100%, 420px);
      background: rgba(24, 28, 40, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, .28);
    }
    h1 { margin: 0 0 8px; color: var(--accent); }
    p { margin: 0 0 18px; color: var(--muted); }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
    input {
      width: 100%;
      margin-bottom: 14px;
      background: #22283a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #08111f;
    }
    .status {
      min-height: 24px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .status.warn { color: var(--warn); }
    .status.success { color: var(--good); }
    .footer {
      margin-top: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome Back</h1>
    <p>Log in to see who is online and send battle challenges.</p>
    <div id="status" class="status"></div>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" required minlength="3">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required minlength="4">
      <button type="submit">Log In</button>
    </form>
    <div class="footer">
      Need an account? <a href="/signup.html">Create one</a>
    </div>
  </div>

  <script>
    const AUTH_TOKEN_KEY = 'battleAuthToken';
    const API_BASE = window.location.origin;

    async function authFetch(path, options = {}) {
      return fetch(`${API_BASE}${path}`, options);
    }

    function setStatus(message, kind = '') {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${kind}`.trim();
    }

    async function checkExistingSession() {
      const token = localStorage.getItem(AUTH_TOKEN_KEY);
      if (!token) return;
      const response = await fetch(`${API_BASE}/api/auth/me`, {
        headers: { 'X-Auth-Token': token }
      }).catch(() => null);
      if (response && response.ok) {
        window.location.href = '/';
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      setStatus('Logging in...', 'success');
      const payload = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      };
      const response = await authFetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(() => null);
      if (!response) {
        setStatus('Could not reach the server.', 'warn');
        return;
      }
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.success) {
        setStatus(data.message || 'Login failed.', 'warn');
        return;
      }
      localStorage.setItem(AUTH_TOKEN_KEY, data.token);
      window.location.href = '/';
    });

    checkExistingSession();
  </script>
</body>
</html>
