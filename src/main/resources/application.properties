spring.application.name=battlesimulator
server.port=${PORT:8080}

# Railway will inject these at runtime. The app still works without a Groq key,
# but AI move selection falls back to a deterministic local heuristic.
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# Keep the app bootable in environments without an external database.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:battlesimulator;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
