services:
  - type: web
    name: pokemon-website
    runtime: java
    plan: free
    buildCommand: ./mvnw -DskipTests clean package
    startCommand: java -jar target/battlesimulator-0.0.1-SNAPSHOT.jar
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
